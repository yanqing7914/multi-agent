name: CI Fast

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  validate:
    name: Fast validation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Python version
        run: python -V
      - name: Validate all adapters
        run: python3 scripts/validate_all_adapters.py
      - name: Codex native plan self-check
        run: python3 adapters/codex/scripts/prepare_native_plan.py --self-check
      - name: Codex finalizer self-check
        run: python3 adapters/codex/scripts/finalize_native_run.py --self-check
      - name: Native installer self-check
        run: python3 scripts/install_native_skills.py --self-check
      - name: Release package verifier self-check
        run: python3 scripts/verify_release_packages.py --self-check
