name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v"
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Build and publish release packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Validate before release
        run: python3 scripts/validate_all_adapters.py
      - name: Build release packages
        run: python3 scripts/build_skill_packages.py --version "${{ steps.version.outputs.version }}"
      - name: Verify release packages
        run: python3 scripts/verify_release_packages.py --version "${{ steps.version.outputs.version }}"
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*-v${{ steps.version.outputs.version }}.zip
