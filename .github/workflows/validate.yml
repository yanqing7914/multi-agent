name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python version
        run: python -V
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Validate all adapters
        run: python3 scripts/validate_all_adapters.py
      - name: Validate OpenClaw scripts
        run: python3 adapters/openclaw/scripts/validate_all.py
      - name: Bench self-check
        run: python3 bench/run_bench.py --self-check --dry-runtime
      - name: SWE-bench Lite self-check
        run: python3 bench/swebench-lite/run_swebench_lite.py --self-check
      - name: OpenClaw local demo self-check
        run: python3 adapters/openclaw/scripts/run_local_demo.py --out /tmp/openclaw-demo-ci --keep
